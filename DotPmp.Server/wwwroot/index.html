<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L Server Rooms</title>
    <style>
        :root {
            --bg-dark: #242424;
            --server-bg: rgba(0, 0, 0, 0.2);
            --overlay-bar: rgba(0, 0, 0, 0.75);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);

            --state-select: #00d4ff;
            --state-wait: #f7b807;
            --state-play: #6ed43e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 0 20px 0;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .header .subtitle {
            color: var(--text-dim);
            font-size: 1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            background: var(--server-bg);
            padding: 20px;
            border-radius: 20px;
        }

        .status-item {
            text-align: center;
            padding: 0 20px;
        }

        .status-item .label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-item .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* 🌟 核心卡片设计 */
        .room-card {
            background-color: #1e1e24;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.8) 100%), var(--bg-img, none);
            background-size: cover;
            background-position: center;

            border-radius: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .room-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px var(--theme-glow-strong, rgba(255,255,255,0.2));
        }

        /* 统一改为全小写 */
        .room-card.state-selectchart {
            border-color: var(--state-select);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
            --theme-color: var(--state-select);
            --theme-glow-strong: rgba(0, 212, 255, 0.5);
        }
        .room-card.state-waitingforready {
            border-color: var(--state-wait);
            box-shadow: 0 0 15px rgba(247, 184, 7, 0.2);
            --theme-color: var(--state-wait);
            --theme-glow-strong: rgba(247, 184, 7, 0.5);
        }
        .room-card.state-playing {
            border-color: var(--state-play);
            box-shadow: 0 0 15px rgba(110, 212, 62, 0.2);
            --theme-color: var(--state-play);
            --theme-glow-strong: rgba(110, 212, 62, 0.5);
        }

        .card-top {
            background: var(--overlay-bar);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .room-id {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 65%;
        }

        .room-state-text {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--theme-color, #fff);
            text-transform: uppercase;
        }

        .card-body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .room-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            text-shadow: none;
        }

        .badge.locked { background: rgba(255, 82, 82, 0.4); color: #ffd1d1; }
        .badge.recruiting { background: rgba(76, 175, 80, 0.4); color: #d4f7d5; }
        .badge.cycle { background: rgba(156, 39, 176, 0.4); color: #f3e5f5; }
        .badge.live {
            background: rgba(244, 67, 54, 0.4);
            color: #ffcdd2;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chart-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chart-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }
        .chart-artist {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .chart-level {
            display: inline-block;
            margin-top: 4px;
            font-size: 0.75rem;
            color: #00d4ff;
            font-weight: bold;
        }

        .card-bottom {
            background: var(--overlay-bar);
            backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .players-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 🌟 头像容器优化，支持图片填充 */
        .player-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            color: #fff;
            overflow: hidden; /* 保证图片圆角 */
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
            display: block;
        }

        .player-name {
            font-size: 0.9rem;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-tag {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }

        .player-tag.host {
            background: rgba(247, 184, 7, 0.2);
            color: #f7b807;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            grid-column: 1 / -1;
        }

        .empty-state .icon { font-size: 3rem; margin-bottom: 15px; }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s;
            z-index: 100;
        }

        .refresh-btn:hover { transform: scale(1.1); }
        .refresh-btn.loading svg { animation: spin 1s linear infinite; }
        .refresh-btn.loading { background: #00d4ff; }
        .refresh-btn svg { width: 24px; height: 24px; fill: var(--bg-dark); }
        .refresh-btn.loading svg { fill: #fff; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .last-update {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="serverName">L Server</h1>
        <p class="subtitle">Phira Multiplayer Rooms - l.pjck.top:20419</p>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <div class="label">Rooms</div>
            <div class="value" id="roomCount">0</div>
        </div>
        <div class="status-item">
            <div class="label">Sessions</div>
            <div class="value" id="sessionCount">0</div>
        </div>
        <div class="status-item">
            <div class="label">Users</div>
            <div class="value" id="userCount">0</div>
        </div>
    </div>

    <div class="rooms-grid" id="roomsGrid">
    </div>

    <div class="last-update" id="lastUpdate">
    短按刷新WebSocket | 长按切换HTTP轮询
</div>
</div>

<button class="refresh-btn" id="refreshBtn">
    <svg viewBox="0 0 24 24">
        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
</button>

<script>

    const stateNames = { 'selectchart': '选曲中', 'waitingforready': '准备中', 'playing': '游戏中' };
    

    // 🌟 双重数据缓存区：谱面和用户头像
    const chartCache = {};
    const userCache = {};

    // WebSocket 连接
    let ws = null;
    let reconnectTimer = null;
    let isAdminConnected = false;
    let adminToken = "lllllllll";

    // 测试 HTTP API
    async function testHttpApi() {
        try {
            console.log('测试 HTTP API...');
            const res = await fetch('/status');
            const data = await res.json();
            console.log('✓ HTTP API 可用:', data);
            document.getElementById('serverName').textContent = data.serverName;
            document.getElementById('roomCount').textContent = data.roomCount;
            document.getElementById('sessionCount').textContent = data.sessionCount;
            document.getElementById('userCount').textContent = data.userCount;
        } catch (e) {
            console.error('✗ HTTP API 不可用:', e);
        }
    }

    // 监控 WebSocket 连接状态
    setInterval(() => {
        if (ws) {
            console.log('WebSocket 状态检查:', {
                readyState: ws.readyState,
                readyStateText: ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'][ws.readyState],
                url: ws.url,
                protocol: ws.protocol
            });
        }
    }, 5000);

    // 初始化
    function init() {
        console.log('初始化应用...');
        console.log('Admin Token:', adminToken);
        console.log('当前页面 URL:', window.location.href);
        console.log('WebSocket URL:', (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/ws');

        // 清除初始提示
        document.getElementById('lastUpdate').textContent = '';

        // 先测试 HTTP API 是否可用
        testHttpApi();

        // 直接尝试 WebSocket 连接
        connectWebSocket();
    }

    // WebSocket 连接
    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;

        console.log('尝试连接 WebSocket:', wsUrl);
        console.log('Admin Token:', adminToken);

        // 清除现有的轮询和重连定时器
        stopPolling();
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }

        try {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('✓ WebSocket 已连接');
                document.getElementById('lastUpdate').textContent = '🟢 WebSocket 已连接';

                // 如果有管理员 Token，使用管理员订阅获取所有房间
                if (adminToken) {
                    console.log('发送管理员订阅请求...');
                    subscribeAsAdmin();
                } else {
                    // 没有管理员Token，使用HTTP轮询
                    console.log('无管理员Token，使用HTTP轮询');
                    startPolling();
                }
            };

            ws.onmessage = (event) => {
                console.log('✓ 收到 WebSocket 消息:', event.data);
                try {
                    const message = JSON.parse(event.data);
                    console.log('✓ 解析后的消息:', message);
                    handleWebSocketMessage(message);
                } catch (e) {
                    console.error('解析消息失败:', e, event.data);
                }
            };

            ws.onerror = (error) => {
                console.error('✗ WebSocket 错误:', error);
                document.getElementById('lastUpdate').textContent = '🔴 连接错误 (Cloudflare?)';

                // 如果是 426 错误，说明 Cloudflare 干扰了 WebSocket，自动切换到 HTTP 轮询
                // 延迟 2 秒后切换，避免频繁重试
                setTimeout(() => {
                    console.log('检测到 Cloudflare 代理干扰，切换到 HTTP 轮询模式');
                    startPolling();
                }, 2000);
            };

            ws.onclose = () => {
                console.log('WebSocket 已断开');
                document.getElementById('lastUpdate').textContent = '🔴 连接已断开';
                isAdminConnected = false;

                // 5秒后重连
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connectWebSocket, 5000);
            };

            // 心跳保持连接
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 1000);

        } catch (error) {
            console.error('WebSocket 连接失败:', error);
            // 如果 WebSocket 不可用，回退到轮询
            startPolling();
        }
    }

    // 管理员订阅
    function subscribeAsAdmin() {
        if (!ws) {
            console.error('WebSocket 对象不存在');
            return;
        }

        if (ws.readyState !== WebSocket.OPEN) {
            console.warn('WebSocket 未连接，当前状态:', ws.readyState, ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'][ws.readyState]);
            // 延迟 1 秒后重试
            setTimeout(subscribeAsAdmin, 1000);
            return;
        }

        console.log('✓ 发送管理员订阅请求，Token:', adminToken);
        const message = JSON.stringify({
            type: 'admin_subscribe',
            token: adminToken
        });
        console.log('✓ 发送消息内容:', message);
        ws.send(message);
    }

    // 重新连接 WebSocket
    function reconnectWebSocket() {
        console.log('重新连接 WebSocket...');
        document.getElementById('lastUpdate').textContent = '🔄 重新连接中...';

        // 关闭现有连接
        if (ws) {
            ws.close();
        }

        // 停止轮询
        stopPolling();

        // 重新连接
        connectWebSocket();
    }

    // 刷新按钮事件处理
    const refreshBtn = document.getElementById('refreshBtn');
    let pressTimer = null;
    let isLongPress = false;

    // 鼠标/触摸按下
    const handlePressStart = (e) => {
        isLongPress = false;
        refreshBtn.classList.add('loading');

        // 设置长按定时器（800ms）
        pressTimer = setTimeout(() => {
            isLongPress = true;
            console.log('长按检测到，切换到 HTTP 轮询模式');
            refreshBtn.classList.remove('loading');
            startPolling();
        }, 800);
    };

    // 鼠标/触摸松开
    const handlePressEnd = (e) => {
        clearTimeout(pressTimer);
        refreshBtn.classList.remove('loading');

        // 如果不是长按，则是短按，重新连接 WebSocket
        if (!isLongPress) {
            console.log('短按检测到，重新连接 WebSocket');
            reconnectWebSocket();
        }

        isLongPress = false;
    };

    // 鼠标事件
    refreshBtn.addEventListener('mousedown', handlePressStart);
    refreshBtn.addEventListener('mouseup', handlePressEnd);
    refreshBtn.addEventListener('mouseleave', () => {
        clearTimeout(pressTimer);
        refreshBtn.classList.remove('loading');
        isLongPress = false;
    });

    // 触摸事件
    refreshBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); // 防止触发鼠标事件
        handlePressStart(e);
    });
    refreshBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        handlePressEnd(e);
    });

    // 处理 WebSocket 消息
    function handleWebSocketMessage(message) {
        switch (message.type) {
            case 'admin_subscribed':
                isAdminConnected = true;
                console.log('管理员订阅成功，使用 WebSocket 实时更新');
                stopPolling(); // 停止HTTP轮询
                break;

            case 'admin_update':
                if (message.data && message.data.changes) {
                    handleAdminUpdate(message.data.changes.rooms);
                }
                break;

            case 'error':
                console.error('WebSocket 错误:', message.message);
                if (message.message === 'unauthorized') {
                    isAdminConnected = false;
                    console.log('管理员Token无效，切换到HTTP轮询');
                    // 管理员 Token 无效，使用HTTP轮询
                    startPolling();
                }
                break;

            case 'pong':
                // 心跳响应
                break;
        }
    }

    // 处理管理员更新
    async function handleAdminUpdate(rooms) {
        console.log('收到管理员更新，房间数:', rooms?.length);
        console.log('房间数据:', rooms);

        if (!rooms || !Array.isArray(rooms)) return;

        // 更新房间计数
        document.getElementById('roomCount').textContent = rooms.length;

        // 转换房间格式
        const formattedRooms = rooms.map(room => ({
            id: room.roomid,
            state: room.state?.type || 'select_chart',
            hostId: room.host?.id,
            hostName: room.host?.name,
            playerCount: room.current_users,
            monitorCount: room.current_monitors,
            isLocked: room.locked,
            isCycle: room.cycle,
            isLive: room.live,
            isRecruiting: !room.locked,
            selectedChartId: room.chart?.id,
            // 合并 users 和 monitors 数组，并正确设置 isMonitor 属性
            players: [
                ...(room.users?.map(u => ({
                    id: u.id,
                    name: u.name,
                    isMonitor: u.is_monitor || false
                })) || []),
                ...(room.monitors?.map(m => ({
                    id: m.id,
                    name: m.name,
                    isMonitor: m.is_monitor !== undefined ? m.is_monitor : true
                })) || [])
            ]
        }));

        console.log('转换后的房间数据:', formattedRooms);

        // 异步获取缺失的谱面和用户信息（不阻塞渲染）
        loadMissingData(formattedRooms);

        // 立即渲染房间列表
        renderRooms(formattedRooms, true);
        document.getElementById('lastUpdate').textContent = '🟢 WebSocket 实时: ' + new Date().toLocaleTimeString('zh-CN');
    }

    // 异步加载缺失的谱面和用户信息
    function loadMissingData(rooms) {
        const fetchTasks = [];

        rooms.forEach(room => {
            // 收集谱面 ID
            if (room.selectedChartId && !chartCache[room.selectedChartId]) {
                fetchTasks.push(
                    fetch(`https://api.phira.cn/chart/${room.selectedChartId}`)
                        .then(res => res.ok ? res.json() : null)
                        .then(data => { chartCache[room.selectedChartId] = data; })
                        .catch(() => { chartCache[room.selectedChartId] = null; })
                );
            }
            // 收集玩家 ID
            room.players.forEach(player => {
                if (player.id && !userCache[player.id]) {
                    fetchTasks.push(
                        fetch(`https://api.phira.cn/user/${player.id}`)
                            .then(res => res.ok ? res.json() : null)
                            .then(data => { userCache[player.id] = data; })
                            .catch(() => { userCache[player.id] = null; })
                    );
                }
            });
        });

        // 执行所有请求，但不等待结果
        if (fetchTasks.length > 0) {
            Promise.all(fetchTasks).then(() => {
                // 数据加载完成后重新渲染
                renderRooms(rooms, true);
            });
        }
    }

    // 轮询模式（作为 WebSocket 的后备）
    function startPolling() {
        console.log('使用HTTP轮询模式');

        // 关闭 WebSocket 连接
        if (ws) {
            ws.close();
            ws = null;
        }

        // 清除重连定时器
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }

        loadData();
        if (!window.pollingInterval) {
            window.pollingInterval = setInterval(loadData, 5000);
        }
    }

    // 停止轮询
    function stopPolling() {
        if (window.pollingInterval) {
            clearInterval(window.pollingInterval);
            window.pollingInterval = null;
        }
    }

    async function loadData() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('loading');

        try {
            // 1. 获取服务器状态
            const statusRes = await fetch('/status');
            const status = await statusRes.json();

            document.getElementById('serverName').textContent = status.serverName;
            document.getElementById('roomCount').textContent = status.roomCount;
            document.getElementById('sessionCount').textContent = status.sessionCount;
            document.getElementById('userCount').textContent = status.userCount;

            // 2. 获取房间列表
            const roomsRes = await fetch('/rooms');
            const data = await roomsRes.json();
            const rooms = data.rooms;

            // 3. 异步加载缺失的谱面和用户信息
            loadMissingData(rooms);

            // 4. 立即渲染房间列表
            renderRooms(rooms, false);
            document.getElementById('lastUpdate').textContent = '📡 HTTP 轮询: ' + new Date().toLocaleTimeString('zh-CN');

        } catch (error) {
            console.error('加载失败:', error);
        } finally {
            btn.classList.remove('loading');
        }
    }

    function renderRooms(rooms, isWebSocketUpdate) {
        const grid = document.getElementById('roomsGrid');

        if (!rooms || rooms.length === 0) {
            grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">💤</div>
                        <h3>当前没有任何房间</h3>
                    </div>
                `;
            return;
        }

        grid.innerHTML = rooms.map(room => {
            // 读取谱面信息
            const chartInfo = (room.selectedChartId && chartCache[room.selectedChartId])
                ? chartCache[room.selectedChartId]
                : null;

            const bgImgStyle = chartInfo && chartInfo.illustration ? `style="--bg-img: url('${chartInfo.illustration}');"` : '';
            const chartName = chartInfo ? chartInfo.name : (room.selectedChartId ? `Chart ID: ${room.selectedChartId}` : '未选曲');
            const chartArtist = chartInfo ? `${chartInfo.composer} / ${chartInfo.charter}` : 'Host: ' + room.hostName;
            const chartLevel = chartInfo ? `<span class="chart-level">${escapeHtml(chartInfo.level)} (定数 ${chartInfo.difficulty.toFixed(1)})</span>` : '';

            // 状态映射
            const rawState = (typeof room.state === 'object' ? room.state.type : room.state) || '';
            const stateKey = rawState.toLowerCase().replace(/_/g, ''); // 移除下划线并转小写
            const displayState = stateNames[stateKey] || rawState;

            return `
                <div class="room-card state-${stateKey}" ${bgImgStyle}>
                <div class="card-top">
                    <div class="room-id">${escapeHtml(room.id)}</div>
                    <div class="room-state-text">${displayState}</div>
                    </div>

                    <div class="card-body">
                        <div class="room-badges">
                            ${room.isRecruiting ? '<span class="badge recruiting">📢 招募中</span>' : ''}
                            ${room.isLocked ? '<span class="badge locked">🔒 已锁定</span>' : ''}
                            ${room.isCycle ? '<span class="badge cycle">🔄 循环</span>' : ''}
                            ${room.isLive ? '<span class="badge live">🔴 Live</span>' : ''}
                        </div>

                        <div class="chart-info">
                            <div class="chart-name">${escapeHtml(chartName)}</div>
                            <div class="chart-artist">${escapeHtml(chartArtist)}</div>
                            ${chartLevel}
                        </div>
                    </div>

                    <div class="card-bottom">
                        <div class="players-label">
                            <span>Players</span>
                            <span>${room.playerCount} / 8</span>
                        </div>
                        <div class="player-list">
                            ${room.players.map(player => {
                // 🌟 处理头像逻辑
                const userInfo = player.id ? userCache[player.id] : null;
                let avatarHtml = '';

                // 如果 API 返回了头像 URL，则显示图片；如果图片加载失败，退回显示首字母
                if (userInfo && userInfo.avatar) {
                    avatarHtml = `
                                        <img src="${escapeHtml(userInfo.avatar)}" alt="avatar"
                                             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                                        <span style="display:none;">${escapeHtml(player.name.charAt(0).toUpperCase())}</span>
                                    `;
                } else {
                    // 没有头像数据，直接显示首字母
                    avatarHtml = escapeHtml(player.name.charAt(0).toUpperCase());
                }

                return `
                                <div class="player-item">
                                    <div class="player-avatar">${avatarHtml}</div>
                                    <span class="player-name">${escapeHtml(player.name)}</span>
                                    ${player.id === room.hostId ? '<span class="player-tag host">房主</span>' : ''}
                                    ${player.isMonitor ? '<span class="player-tag">观众</span>' : ''}
                                </div>
                                `;
            }).join('')}
                        </div>
                    </div>
                </div>
                `;
        }).join('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 启动应用
    init();
</script>
</body>
</html>
